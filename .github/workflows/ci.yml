name: CI

on:
  push:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - LICENSE

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, linux]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: sudo apt-get install -y build-essential python3
      - run: npm ci
      - run: npm run build
      - run: npm test
