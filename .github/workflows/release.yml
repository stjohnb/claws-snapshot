name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - LICENSE

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: [self-hosted, linux]
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Compute version tag
        id: version
        run: |
          today=$(date -u +%Y-%m-%d)
          last=$(git tag --list "v${today}.*" --sort=-v:refname | head -n1)
          if [ -z "$last" ]; then
            v=1
          else
            v=$(( ${last##*.} + 1 ))
          fi
          echo "tag=v${today}.${v}" >> "$GITHUB_OUTPUT"

      - run: npm ci
      - name: Inject version into build
        run: echo 'export const VERSION = "${{ steps.version.outputs.tag }}";' > src/version.ts
      - run: npm run build
      - run: npm prune --omit=dev

      - name: Create release tarball
        run: tar -czf claws.tar.gz dist/ deploy/ node_modules/

      - name: Push tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${{ steps.version.outputs.tag }}$" | head -n1)
          if [ -z "$PREV_TAG" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<RELEASE_EOF"
              git log --oneline --no-merges "$PREV_TAG"..HEAD | head -20
              echo "RELEASE_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          files: claws.tar.gz

  docker:
    needs: release
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image repo (lowercase)
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      # Do NOT add `cache-to: type=gha` / `cache-from: type=gha` here.
      # The gha BuildKit cache leaked 6+ GB into the org-shared 2 GB Actions
      # storage quota (issues #1698, #1717). Releases are infrequent; rebuilding
      # layers from the registry each time is the intended trade-off.
      # docker/build-push-action auto-uploads a `.dockerbuild` build record as a
      # workflow artifact on every run (default 90-day retention). With a release
      # per push to main these accumulated to 280 artifacts / 15+ MB against the
      # org-shared 2 GB Actions-storage quota (issue #1750). We don't consume the
      # build record, so disable the upload.
      - uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:${{ needs.release.outputs.tag }}
            ghcr.io/${{ steps.repo.outputs.name }}:latest
